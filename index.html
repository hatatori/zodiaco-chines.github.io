<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultado - Cabra</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>

<body>
    <main class="card">
        <section class="card-header">
            <h1 id="nomeSigno"></h1>
            <p>Descubra o seu signo no horóscopo chinês</p>
        </section>

        <section class="content">
            <div style="margin-bottom: 28px; text-align: left; margin-top: 10px">


                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <input type="number" id="numero" placeholder="Ano de nascimento (1997)" style="
              flex:1;
              min-width:180px;
              padding:14px 18px;
              border-radius:16px;
              border:2px solid #fecaca;
              outline:none;
              font-size:1rem;
              transition:0.2s;
            " />

                    <button class="btn btn-primary" onclick="descobrir()">
                        Descobrir
                    </button>
                </div>
            </div>

            <div class="conteudo">
                <div class="image-wrap">
                    <img id="imagemSigno" />
                </div>

                <div>
                    <h2>Descrição</h2>

                    <p id="descricao"> </p>
                </div>
            </div>


        </section>
    </main>


</body>

</html>
